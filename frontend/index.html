<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yksinkertainen Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="chat-container">
        <div id="chat-window">
            <div class="message bot">Hei! Miten voin auttaa?</div>
        </div>

        <form id="input-area">
            <input type="text" id="user-input" placeholder="Kirjoita viesti..." autocomplete="off">
            <button type="submit">Lähetä</button>
        </form>
    </div>
    <script src="app.js"></script>
</body>

</html>
